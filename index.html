<!DOCTYPE html>
<html lang="vi">
<head>
  <meta property="og:title" content="Tra cứu tuyển sinh lớp 1 - Trường Tiểu học Lý Thường Kiệt" />
  <meta property="og:description" content="Xem nhanh kết quả tuyển sinh, phân lớp và giáo viên chủ nhiệm năm học 2026 - 2027." />
  <meta property="og:image" content="https://tieuhoclythuongkiet.netlify.app/thumbnail.jpg" />
  <meta property="og:url" content="https://tieuhoclythuongkiet.netlify.app/" />
  <meta property="og:type" content="website" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tra cứu danh sách lớp 1 - Trường Tiểu học Lý Thường Kiệt</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Be Vietnam Pro', Arial, sans-serif;
    }

    /* LỚP NỀN RIPPLE CHẠY ĐƯỢC TRÊN ĐIỆN THOẠI */
    #ripple-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* Đẩy ra sau cùng làm nền */
      background-image: url('background.jpg'); 
      background-size: cover;
      background-position: center;
    }

    /* Khung chứa nội dung chính nằm đè lên lớp nền ripple */
    .main-content {
      position: relative;
      z-index: 1;
      padding: 20px;
      box-sizing: border-box;
      min-height: 100vh;
      overflow-y: auto;
    }

    .header-container {
      max-width: 900px;
      margin: 0 auto 20px auto;
      background: rgba(255,255,255,0.88);
      border-radius: 15px;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .logo-box {
      flex: 0 0 150px;
      text-align: center;
    }

    .logo-box img {
      width: 150px;
      height: auto;
    }

    /* Đã sửa lỗi trùng lặp thẻ .title-box */
    .title-box {
      flex: 1;
      text-align: center;
    }

    .line1 {
      font-size: 16px;
      font-weight: 700;
      color: #003366;
      letter-spacing: 0.5px;
    }

    .line2 {
      font-size: 18px;
      font-weight: 700;
      color: #003366;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .divider {
      width: 180px;
      height: 2px;
      background: #003366;
      margin: 12px auto 18px auto;
    }

    .main-title {
      font-size: 28px;
      font-weight: 800;
      color: #0066cc;
      line-height: 1.2;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
    }

    .year {
      font-size: 18px;
      font-weight: 700;
      color: #003366;
      margin-top: 10px;
    }

    .input-box {
      max-width: 400px;
      margin: 0 auto;
      background-color: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      /* Tránh tình trạng iOS tự động phóng to màn hình khi nhấn vào ô nhập */
      font-family: inherit;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:active {
      background-color: #004499;
    }

    .result {
      max-width: 400px;
      margin: 30px auto 0 auto;
      font-size: 16px;
      font-weight: 500;
      text-align: left;
      line-height: 1.6;
    }

    .result div {
      padding: 12px;
      border-radius: 6px;
      margin: 6px 0;
    }

    .result div:nth-child(odd) {
      background-color: rgba(208, 234, 255, 0.95);
    }

    .result div:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.95);
    }

    .note {
      max-width: 600px;
      margin: 40px auto 20px auto;
      font-size: 16px;
      text-align: center;
      color: #cc0000;
      background-color: rgba(255, 255, 255, 0.85);
      padding: 12px;
      border-radius: 10px;
    }

    /* ĐÁP ỨNG GIAO DIỆN DI ĐỘNG (RESPONSIVE) */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        padding: 15px;
        gap: 12px;
      }

      .logo-box {
        flex: none;
      }

      .logo-box img {
        width: 110px;
      }

      .line1 { font-size: 13px; }
      .line2 { font-size: 14px; }
      .main-title { font-size: 22px; }
      .year { font-size: 15px; }
      .divider { margin: 8px auto; }
      
      .main-content {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

  <div id="ripple-bg"></div>

  <div class="main-content">
    <div class="header-container">
      <div class="logo-box">
        <img src="logo.png" alt="Logo Trường Tiểu học Lý Thường Kiệt">
      </div>
      <div class="title-box">
        <div class="line1">UỶ BAN NHÂN DÂN PHƯỜNG VIỆT HƯNG</div>
        <div class="line2">TRƯỜNG TIỂU HỌC LÝ THƯỜNG KIỆT</div>
        <div class="divider"></div>
        <div class="main-title">TRA CỨU DANH SÁCH LỚP 1</div>
        <div class="year">NĂM HỌC 2025 - 2026</div>
      </div>
    </div>  

    <div class="input-box">
      <input type="text" id="hoTen" placeholder="Nhập họ tên học sinh" autocomplete="off" />
      <input type="text" id="maDinhDanh" placeholder="Nhập mã định danh" autocomplete="off" />
      <button onclick="traCuu()">Tra cứu</button>
    </div>

    <div id="ketQua" class="result"></div>
    
    <div class="note">Nếu có bất kỳ thắc mắc nào, phụ huynh vui lòng liên hệ số điện thoại: <strong>0918 577 771</strong></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ripples/0.5.3/jquery.ripples.min.js"></script>

  <script>
    // KÍCH HOẠT RIPPLE CHO CẢ ĐIỆN THOẠI & MÁY TÍNH
    $(document).ready(function () {
      try {
        $('#ripple-bg').ripples({
          resolution: 256,       // Giảm phân giải xuống 256 giúp điện thoại xử lý mượt mà, không giật lag
          dropRadius: 8,         // Bán kính sóng to hơn một chút để dễ nhìn thấy khi chạm ngón tay
          perturbance: 0.02,     // Tốc độ và mức độ lan tỏa của sóng gợn nước
          interactive: true      // Cho phép người dùng chạm/click để tạo sóng
        });
      } catch (e) {
        console.warn("Trình duyệt không hỗ trợ WebGL để chạy hiệu ứng gợn nước:", e);
      }
    });

    let duLieu = [];

    // Tải dữ liệu từ data.json
    fetch('data.json')
      .then(response => response.json())
      .then(data => duLieu = data)
      .catch(err => console.error("Không thể tải file data.json:", err));

    function traCuu() {
      const hoTen = document.getElementById("hoTen").value.trim().toLowerCase();
      const maDinhDanh = document.getElementById("maDinhDanh").value.trim();
      const ketQua = document.getElementById("ketQua");
      ketQua.innerHTML = "";

      if (!hoTen || !maDinhDanh) {
        ketQua.innerHTML = "<div style='color:red; text-align:center;'>⚠️ Vui lòng nhập đầy đủ Họ tên và Mã định danh!</div>";
        return;
      }

      const hs = duLieu.find(item => {
        if (!item["Họ và tên"] || !item["Mã định danh của HS"]) return false;

        const tenTrongJson = item["Họ và tên"].toString().trim().toLowerCase();
        const maTrongJson = item["Mã định danh của HS"].toString().trim();

        return tenTrongJson === hoTen && maTrongJson === maDinhDanh;
      });

      if (hs) {
        ketQua.innerHTML = `
          <div>🔸 Họ tên học sinh: <strong>${hs["Họ và tên"]}</strong></div>
          <div>🔸 Ngày sinh: <strong>${hs["Ngày tháng năm sinh"]}</strong></div>
          <div>🔸 Mã định danh: <strong>${hs["Mã định danh của HS"]}</strong></div>
          <div>🔸 Nơi sinh: <strong>${hs["Nơi sinh (Huyện, tỉnh)"]}</strong></div>
          <div>🔸 Nơi ở hiện tại: <strong>${hs["Nơi ở hiện tại"]}</strong></div>
          <div style="text-align:center; color:#ff4757;">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
          <div>🏫 Chào mừng em <strong>${hs["Họ và tên"]}</strong> đến với Trường Tiểu học Lý Thường Kiệt!</div>
          <div>🎉 Em sẽ là học sinh của lớp <strong>${hs["Học lớp"]}</strong> thân yêu.</div>
          <div>👩‍🏫 Cô giáo chủ nhiệm của lớp là: <strong>${hs["Giáo viên chủ nhiệm"]}</strong>.</div>
          <div style="text-align:center;">🌟 <strong>Chúc em có một hành trình học tập tuyệt vời tại ngôi trường Tiểu học Lý Thường Kiệt!</strong>🌟</div>
        `;
      } else {
        ketQua.innerHTML = "<div style='color:#cc0000; font-weight:bold; text-align:center;'>❗ Không tìm thấy học sinh. Vui lòng kiểm tra lại họ tên và mã định danh.</div>";
      }
    }

    // Xử lý sự kiện bấm Enter hoặc bấm nút "Tìm kiếm/Đi" trên bàn phím ảo điện thoại
    document.addEventListener("DOMContentLoaded", function () {
      const inputs = document.querySelectorAll("#hoTen, #maDinhDanh");
      inputs.forEach(input => {
        input.addEventListener("keyup", function (event) {
          if (event.key === "Enter") {
            traCuu();
            input.blur(); // Tự động ẩn bàn phím điện thoại sau khi tra cứu để phụ huynh nhìn rõ kết quả
          }
        });
      });
    });
  </script>
</body>
</html>
